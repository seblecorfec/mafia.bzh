<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mafia.bzh — IA Studio</title>
  <meta name="description" content="Clan d'entrepreneurs de la tech bretonne et d'agents IA ayant pour ambition de créer le 1er IA Startup Studio Breton en lançant une multitude de projets par an." />
  <meta property="og:title" content="Mafia.bzh — 1er IA Startup Studio Breton" />
  <meta property="og:description" content="Clan d'entrepreneurs de la tech bretonne et d'agents IA ayant pour ambition de créer le 1er IA Startup Studio Breton en lançant une multitude de projets par an." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mafia.bzh" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --noir:       #000000;
      --anthracite: #0d0d0d;
      --blanc:      #ffffff;
      --gris:       #3a3a3a;
      --gris-clair: #7a7a7a;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--noir);
      color: var(--blanc);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* grain subtil */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1000;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* ligne verticale centrale */
    .page::after {
      content: '';
      position: absolute;
      top: 8vh; bottom: 8vh; left: 50%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.12), transparent);
      pointer-events: none; z-index: 1;
    }

    /* ── COL GAUCHE ── */
    .col-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(2rem,4vw,4rem) clamp(2rem,3.5vw,4rem) clamp(2rem,4vw,4rem) clamp(3rem,5.5vw,6rem);
      position: relative;
      background: var(--noir);
      animation: fadeLeft 1s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .line-top {
      position: absolute;
      top: clamp(1.2rem,2.5vw,2rem);
      left: clamp(3rem,5.5vw,6rem); right: clamp(2rem,3.5vw,4rem);
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
    }
    .line-bottom {
      position: absolute;
      bottom: clamp(1.2rem,2.5vw,2rem);
      left: clamp(3rem,5.5vw,6rem); right: clamp(2rem,3.5vw,4rem);
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
    }

    .hero-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      gap: clamp(1rem,2vh,1.8rem);
      max-width: 460px;
    }

    .logo-wrap { width: clamp(150px,25vw,280px); }
    .logo-wrap img { width: 100%; height: auto; display: block; }

    .divider {
      width: clamp(32px,4vw,52px);
      height: 1px;
      background: rgba(255,255,255,0.25);
    }

    .baseline {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(0.78rem,1.15vw,0.98rem);
      line-height: 1.8;
      color: var(--gris-clair);
      letter-spacing: 0.01em;
    }

    .cta-wrap {
      display: flex; flex-direction: column;
      gap: 0; margin-top: 0.4rem;
    }

    .btn-clan {
      display: inline-block;
      padding: 0.78rem 2rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: var(--blanc);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(0.7rem,1vw,0.82rem);
      letter-spacing: 0.2em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color 0.3s ease;
      align-self: flex-start;
    }
    .btn-clan::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--blanc);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
      z-index: -1;
    }
    .btn-clan:hover, .btn-clan:focus-visible { color: var(--noir); }
    .btn-clan:hover::before, .btn-clan:focus-visible::before { transform: scaleX(1); }
    .btn-clan:focus-visible { outline: 1px solid var(--blanc); outline-offset: 4px; }

    /* ── COL DROITE ── */
    .col-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(2rem,4vw,4rem) clamp(3rem,5.5vw,6rem) clamp(2rem,4vw,4rem) clamp(2rem,3.5vw,4rem);
      background: var(--anthracite);
      animation: fadeRight 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
      gap: clamp(1.2rem,2.5vh,2rem);
    }

    @keyframes fadeRight {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .manifeste-header {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.5rem;
      width: 100%;
    }

    .section-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.58rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gris-clair);
    }

    .section-title {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: clamp(1.6rem,3.5vw,2.6rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blanc);
      line-height: 1;
    }

    .video-wrapper {
      width: 100%; max-width: 560px;
      aspect-ratio: 16/9;
      border-radius: 2px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.07),
        0 20px 60px rgba(0,0,0,0.9);
    }
    .video-wrapper iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #111;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--gris-clair);
      font-size: 0.65rem; letter-spacing: 0.15em;
      padding: 0.45rem 1.1rem;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .page {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
      }
      .page::after { display: none; }
      .col-left {
        align-items: center; text-align: center;
        padding: 3.5rem 1.8rem 2.5rem;
      }
      .line-top, .line-bottom { left: 1.8rem; right: 1.8rem; }
      .hero-content { align-items: center; max-width: 100%; }
      .btn-clan { align-self: center; }
      .col-right { padding: 2.5rem 1.8rem 3rem; }
    }

    :focus-visible { outline: 1px solid var(--blanc); outline-offset: 4px; }
    .skip-link {
      position: absolute; top: -100%; left: 1rem;
      background: #111; color: var(--blanc);
      padding: 0.4rem 0.8rem; font-size: 0.7rem;
      letter-spacing: 0.1em; z-index: 9999;
      text-decoration: none; border: 1px solid var(--blanc);
    }
    .skip-link:focus { top: 0.5rem; }
  </style>
</head>
